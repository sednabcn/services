name: Email Campaign System (Integrated Architecture)
on:
  push:
    branches: ["dev"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no emails sent)'
        required: false
        default: 'true'
        type: boolean
      use_summary_script:
        description: 'Use Python summary utility'
        required: false
        default: 'true'
        type: boolean
      target_domain:
        description: 'Target specific domain for campaign processing'
        required: false
        type: string
      campaign_filter:
        description: 'Filter campaigns by domain pattern'
        required: false
        type: string
      skip_feedback_injection:
        description: 'Skip feedback email integration'
        required: false
        default: 'false'
        type: boolean
      force_remote_mode:
        description: 'Force remote-only processing mode'
        required: false
        default: 'false'
        type: boolean
      skip_test_data:
        description: 'Skip test data creation (use only real data)'
        required: false
        default: 'true'
        type: boolean
      force_continue:
        description: 'Continue execution even if validation fails'
        required: false
        default: 'false'
        type: boolean

jobs:
  integrated-campaign-processor:
    runs-on: ubuntu-latest
    env:
      ALERT_EMAIL: alerts@modelphysmat.com
      FEEDBACK_EMAIL: feedback@modelphysmat.com
      TRACKING_DIR: tracking
      SCHEDULED_DIR: scheduled-campaigns
      TEMPLATES_DIR: campaign-templates
      CONTACTS_DIR: contacts
      DRY_RUN: ${{ github.event.inputs.dry_run }}
      DEBUG_MODE: 'false'
      ENVIRONMENT: 'github-actions'
      MODE: ${{ github.event.inputs.dry_run == 'true' && 'dry-run' || 'live' }}
      SKIP_TEST_DATA: ${{ github.event.inputs.skip_test_data }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          echo "🔧 Installing Python dependencies for integrated system..."
          python -m pip install --upgrade pip
          
          # Core libraries for contact processing
          pip install pandas requests python-docx openpyxl urllib3 chardet
          
          # Additional libraries if requirements.txt exists
          if [ -f requirements.txt ]; then 
            pip install -r requirements.txt
            echo "✅ Installed additional requirements from requirements.txt"
          fi
          
          echo "🎯 Dependencies installation completed"
          
          # Verify critical libraries
          python -c "import pandas, requests; print('✅ pandas and requests available')"
          python -c "import docx; print('✅ python-docx available')" || echo "⚠️ Warning: python-docx not available"

      - name: Prepare directory structure
        run: |
          echo "📁 Preparing integrated campaign system directories..."
          mkdir -p "$TEMPLATES_DIR" "$CONTACTS_DIR" "$SCHEDULED_DIR" "$TRACKING_DIR" utils reports
          
          # Set up utils directory structure
          echo "🔧 Setting up utils directory..."
          
          # Copy main scripts to utils for organization
          if [ -f "data_loader.py" ]; then
            cp data_loader.py utils/
            echo "✅ Copied data_loader.py to utils/"
          fi
          
          if [ -f "docx_parser.py" ]; then
            cp docx_parser.py utils/
            echo "✅ Copied docx_parser.py to utils/"
          fi
          
          if [ -f "generate_summary.py" ]; then
            cp generate_summary.py utils/
            echo "✅ Copied generate_summary.py to utils/"
          fi
          
          echo "✅ Directory structure ready"

      - name: Create integrated runner
        run: |
          echo "🚀 Creating integrated runner..."
          
          # The integrated_runner.py will be created from the artifact above
          # For now, we'll create a placeholder that calls the individual scripts
          cat > utils/integrated_runner.py << 'EOF'
          #!/usr/bin/env python3
          """
          Integrated runner - coordinates the email campaign system components
          """
          import os
          import sys
          import json
          import argparse
          import subprocess
          from datetime import datetime
          
          # Add current directory to path for imports
          sys.path.insert(0, '.')
          sys.path.insert(0, 'utils')
          
          def main():
              parser = argparse.ArgumentParser(description='Integrated Email Campaign System')
              parser.add_argument("--contacts", default="contacts")
              parser.add_argument("--scheduled", default="scheduled-campaigns") 
              parser.add_argument("--tracking", default="tracking")
              parser.add_argument("--templates", default="campaign-templates")
              parser.add_argument("--alerts", required=True)
              parser.add_argument("--dry-run", action="store_true")
              
              args = parser.parse_args()
              
              print("🚀 Integrated Email Campaign System Starting...")
              print(f"Mode: {'DRY-RUN' if args.dry_run else 'LIVE'}")
              
              # Ensure tracking directory exists
              os.makedirs(args.tracking, exist_ok=True)
              
              # Step 1: Load contacts using data_loader
              print("\n📇 Step 1: Loading contacts...")
              try:
                  from data_loader import load_contacts
                  contacts = []
                  
                  if os.path.exists(args.contacts):
                      for filename in os.listdir(args.contacts):
                          if filename.endswith(('.csv', '.xlsx', '.url', '.json')):
                              file_path = os.path.join(args.contacts, filename)
                              try:
                                  file_contacts = load_contacts(file_path)
                                  contacts.extend(file_contacts)
                                  print(f"✅ Loaded {len(file_contacts)} contacts from {filename}")
                              except Exception as e:
                                  print(f"⚠️ Error loading {filename}: {e}")
                  
                  # Save contacts for docx_parser
                  contacts_file = os.path.join(args.tracking, 'loaded_contacts.json')
                  with open(contacts_file, 'w') as f:
                      json.dump(contacts, f, indent=2, default=str)
                  
                  print(f"✅ Total contacts loaded: {len(contacts)}")
                  
              except Exception as e:
                  print(f"❌ Error in contact loading: {e}")
                  contacts = []
              
              # Step 2: Run campaign processor
              print(f"\n📧 Step 2: Processing campaigns...")
              
              cmd = [
                  'python', 'utils/docx_parser.py',
                  '--contacts', args.contacts,
                  '--scheduled', args.scheduled,
                  '--tracking', args.tracking,
                  '--templates', args.templates,
                  '--alerts', args.alerts
              ]
              
              if args.dry_run:
                  cmd.append('--dry-run')
              
              try:
                  result = subprocess.run(cmd, capture_output=True, text=True, timeout=300)
                  print(f"Campaign processor exit code: {result.returncode}")
                  if result.stdout:
                      print("STDOUT:", result.stdout[-500:])  # Last 500 chars
                  if result.stderr:
                      print("STDERR:", result.stderr[-500:])   # Last 500 chars
              except Exception as e:
                  print(f"❌ Error running campaign processor: {e}")
              
              # Step 3: Generate summary
              print(f"\n📊 Step 3: Generating summary...")
              
              log_file = "dryrun.log" if args.dry_run else "campaign_execution.log"
              if not os.path.exists(log_file):
                  # Try alternative names
                  for alt in ["campaign.log", "dryrun.log", "campaign_execution.log"]:
                      if os.path.exists(alt):
                          log_file = alt
                          break
              
              if os.path.exists(log_file):
                  summary_cmd = [
                      'python', 'utils/generate_summary.py',
                      '--log-file', log_file,
                      '--mode', 'dry-run' if args.dry_run else 'live',
                      '--contacts-dir', args.contacts,
                      '--show-contacts'
                  ]
                  
                  try:
                      result = subprocess.run(summary_cmd, capture_output=True, text=True, timeout=180)
                      print(f"Summary generator exit code: {result.returncode}")
                      if result.stdout:
                          print("Summary preview:")
                          print(result.stdout[:1000])
                  except Exception as e:
                      print(f"❌ Error generating summary: {e}")
              else:
                  print(f"⚠️ No log file found for summary")
              
              print(f"\n✅ Integrated system execution completed")
              return 0
          
          if __name__ == "__main__":
              sys.exit(main())
          EOF
          
          chmod +x utils/integrated_runner.py
          echo "✅ Integrated runner created"

      - name: Validate real data sources and setup
        run: |
          echo "🔍 Validating real data sources and system setup..."
          
          # Check for real contact files
          REAL_DATA_FOUND=false
          
          if [ -d "$CONTACTS_DIR" ] && [ -n "$(ls -A "$CONTACTS_DIR" 2>/dev/null)" ]; then
            echo "📁 Found contacts directory with files:"
            ls -la "$CONTACTS_DIR"
            
            # Count different file types
            URL_FILES=$(find "$CONTACTS_DIR" -name "*.url" 2>/dev/null | wc -l)
            CSV_FILES=$(find "$CONTACTS_DIR" -name "*.csv" 2>/dev/null | wc -l)
            EXCEL_FILES=$(find "$CONTACTS_DIR" -name "*.xlsx" 2>/dev/null | wc -l)
            
            echo "📊 Data sources found:"
            echo "  - Google Sheets URLs (.url): $URL_FILES"
            echo "  - CSV files: $CSV_FILES"
            echo "  - Excel files: $EXCEL_FILES"
            
            if [ "$URL_FILES" -gt 0 ] || [ "$CSV_FILES" -gt 0 ] || [ "$EXCEL_FILES" -gt 0 ]; then
              REAL_DATA_FOUND=true
              echo "✅ REAL DATA SOURCES DETECTED"
            fi
          fi
          
          # Test Google Sheets connectivity
          if [ "$URL_FILES" -gt 0 ]; then
            echo "🔗 Testing Google Sheets connectivity..."
            for url_file in "$CONTACTS_DIR"/*.url; do
              if [ -f "$url_file" ]; then
                echo "Testing: $(basename "$url_file")"
                SHEETS_URL=$(cat "$url_file" | head -1)
                
                if [[ "$SHEETS_URL" =~ docs\.google\.com/spreadsheets ]]; then
                  SHEET_ID=$(echo "$SHEETS_URL" | grep -o '/d/[^/]*' | cut -d'/' -f3)
                  CSV_URL="https://docs.google.com/spreadsheets/d/$SHEET_ID/export?format=csv&gid=0"
                  
                  HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$CSV_URL" --max-time 10)
                  
                  if [ "$HTTP_STATUS" = "200" ]; then
                    echo "✅ Google Sheets accessible (HTTP $HTTP_STATUS)"
                  elif [ "$HTTP_STATUS" = "403" ]; then
                    echo "❌ Google Sheets access denied (HTTP 403) - check sharing settings"
                  else
                    echo "⚠️ Google Sheets returned HTTP $HTTP_STATUS"
                  fi
                fi
              fi
            done
          fi
          
          # Set environment variable
          echo "REAL_DATA_FOUND=$REAL_DATA_FOUND" >> $GITHUB_ENV
          
          # Validate required files exist
          echo "🔍 Validating required system files..."
          
          VALIDATION_ISSUES=0
          for file in "utils/data_loader.py" "utils/docx_parser.py" "utils/generate_summary.py"; do
            if [ ! -f "$file" ]; then
              echo "❌ Missing required file: $file"
              VALIDATION_ISSUES=$((VALIDATION_ISSUES + 1))
            else
              echo "✅ Found: $file"
            fi
          done
          
          echo "VALIDATION_ISSUES=$VALIDATION_ISSUES" >> $GITHUB_ENV

      - name: Create minimal test data (if needed)
        if: env.REAL_DATA_FOUND != 'true' && github.event.inputs.skip_test_data != 'true'
        run: |
          echo "⚠️ No real data found - creating minimal test data..."
          echo "To use real data, add .url files with Google Sheets URLs to the contacts directory"
          
          # Create test contact file
          cat > "$CONTACTS_DIR/test_contacts.csv" << 'EOF'
          name,email
          Test User 1,test1@example.com
          Test User 2,test2@example.com
          Test User 3,test3@example.com
          EOF
          
          echo "✅ Created test contacts file"
          
          # Create test campaign if none exist
          if [ ! -d "$SCHEDULED_DIR" ] || [ -z "$(ls -A "$SCHEDULED_DIR" 2>/dev/null)" ]; then
            mkdir -p "$SCHEDULED_DIR"
            cat > "$SCHEDULED_DIR/test_campaign.txt" << 'EOF'
          Subject: Test Campaign - {name}
          
          Hello {name},
          
          This is a test campaign message.
          
          Best regards,
          Test Campaign System
          EOF
            echo "✅ Created test campaign file"
          fi

      - name: Run integrated campaign system
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🚀 Starting integrated campaign system..."
          echo "Environment: $ENVIRONMENT"
          echo "Mode: $MODE"
          echo "Real Data Found: ${REAL_DATA_FOUND:-false}"
          echo "Validation Issues: ${VALIDATION_ISSUES:-0}"
          
          # Build integrated runner arguments
          RUNNER_ARGS="--contacts $CONTACTS_DIR --scheduled $SCHEDULED_DIR --tracking $TRACKING_DIR --templates $TEMPLATES_DIR --alerts $ALERT_EMAIL"
          
          if [ "$DRY_RUN" == "true" ]; then
            RUNNER_ARGS="$RUNNER_ARGS --dry-run"
            echo "🔄 Running in DRY-RUN mode"
          else
            echo "🚀 Running in LIVE mode"
          fi
          
          # Add force continue if validation issues and user requested
          if [ "${VALIDATION_ISSUES:-0}" -gt 0 ] && [ "${{ github.event.inputs.force_continue }}" == "true" ]; then
            RUNNER_ARGS="$RUNNER_ARGS --force-continue"
            echo "⚠️ Forcing continuation despite validation issues"
          fi
          
          # Execute integrated runner
          echo "Command: python utils/integrated_runner.py $RUNNER_ARGS"
          
          python utils/integrated_runner.py $RUNNER_ARGS 2>&1 | tee execution.log
          
          # Check if execution was successful
          if [ ${PIPESTATUS[0]} -eq 0 ]; then
            echo "✅ Integrated campaign system completed successfully"
            echo "EXECUTION_STATUS=SUCCESS" >> $GITHUB_ENV
          else
            echo "❌ Integrated campaign system completed with issues"
            echo "EXECUTION_STATUS=ISSUES_DETECTED" >> $GITHUB_ENV
          fi

      - name: Generate enhanced summary report
        if: always()
        run: |
          echo "📊 Generating enhanced summary report..."
          
          # Determine which log file to use
          LOG_FILE=""
          if [ "$DRY_RUN" == "true" ] && [ -f "dryrun.log" ]; then
            LOG_FILE="dryrun.log"
            MODE_TEXT="Dry-Run Execution"
          elif [ -f "campaign_execution.log" ]; then
            LOG_FILE="campaign_execution.log"
            MODE_TEXT="Live Execution"
          elif [ -f "campaign.log" ]; then
            LOG_FILE="campaign.log"
            MODE_TEXT="Campaign Execution"
          else
            LOG_FILE="execution.log"
            MODE_TEXT="Integrated Execution"
          fi
          
          echo "📄 Using log file: $LOG_FILE"
          
          # Generate summary to GitHub Step Summary
          echo "## Integrated Email Campaign System Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Execution Details:**" >> $GITHUB_STEP_SUMMARY
          echo "- **Mode:** $MODE_TEXT" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** $ENVIRONMENT" >> $GITHUB_STEP_SUMMARY
          echo "- **Real Data Sources:** ${REAL_DATA_FOUND:-false}" >> $GITHUB_STEP_SUMMARY
          echo "- **Execution Status:** ${EXECUTION_STATUS:-UNKNOWN}" >> $GITHUB_STEP_SUMMARY
          echo "- **Validation Issues:** ${VALIDATION_ISSUES:-0}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Try to use the Python summary generator if available
          if [ -f "utils/generate_summary.py" ] && [ -f "$LOG_FILE" ]; then
            echo "🐍 Using Python summary generator..."
            
            python utils/generate_summary.py \
              --log-file "$LOG_FILE" \
              --mode "${MODE,,}" \
              --contacts-dir "$CONTACTS_DIR" \
              --show-contacts \
              --max-contacts-display 5 \
              --output-summary summary_temp.md || true
            
            # Append Python-generated summary if it exists
            if [ -f "summary_temp.md" ]; then
              echo "✅ Python summary generated successfully"
              cat summary_temp.md >> $GITHUB_STEP_SUMMARY
            else
              echo "⚠️ Python summary generation failed, using fallback"
            fi
          fi
          
          # Add execution log excerpt
          if [ -f "$LOG_FILE" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Recent Execution Log:**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -20 "$LOG_FILE" >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Log file empty or unreadable" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          
          # Add file listing
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Generated Files:**" >> $GITHUB_STEP_SUMMARY
          if [ -d "$TRACKING_DIR" ] && [ -n "$(ls -A "$TRACKING_DIR" 2>/dev/null)" ]; then
            echo "Tracking files:" >> $GITHUB_STEP_SUMMARY
            ls -la "$TRACKING_DIR" | tail -n +2 | while read line; do
              echo "- $line" >> $GITHUB_STEP_SUMMARY
            done
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*Generated by Integrated Email Campaign System at $(date)*" >> $GITHUB_STEP_SUMMARY

      - name: Upload comprehensive artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integrated-campaign-results-${{ github.run_id }}
          path: |
            campaign_execution.log
            dryrun.log
            execution.log
            error.log
            summary_temp.md
            tracking/
            utils/
            contacts/
            scheduled-campaigns/
            templates/
            reports/
          retention-days: 30
          if-no-files-found: ignore

      - name: Final status notification
        if: always()
        run: |
          echo "🏁 Final Integrated Campaign System Status: ${EXECUTION_STATUS:-UNKNOWN}"
          
          case "${EXECUTION_STATUS:-UNKNOWN}" in
            "SUCCESS")
              echo "✅ ALL OPERATIONS COMPLETED SUCCESSFULLY"
              if [ "${REAL_DATA_FOUND:-false}" = "true" ]; then
                echo "📊 Real Google Sheets data was processed"
              else
                echo "🧪 Test data was used (no real data sources found)"
              fi
              ;;
            "ISSUES_DETECTED")
              echo "❌ Issues detected during execution"
              echo "🔍 Manual review of logs and artifacts recommended"
              ;;
            *)
              echo "❓ Unable to determine final execution status"
              echo "📋 Check execution logs and artifacts for details"
              ;;
          esac
          
          echo ""
          echo "🔗 Workflow Details:"
          echo "- Run ID: ${{ github.run_id }}"
          echo "- Repository: ${{ github.repository }}"
          echo "- Branch: ${{ github.ref_name }}"
          echo "- Commit: ${{ github.sha }}"
          
          echo ""
          echo "🎯 Integration Architecture: ACTIVE"
          echo "   - Unified contact loading via data_loader.py"
          echo "   - Coordinated campaign processing via integrated_runner.py"
          echo "   - Enhanced reporting via generate_summary.py"
          echo "   - Comprehensive error handling and validation"
          
          # Set final GitHub environment status
          if [ "${EXECUTION_STATUS}" = "SUCCESS" ]; then
            if [ "${REAL_DATA_FOUND:-false}" = "true" ]; then
              echo "FINAL_STATUS=SUCCESS_WITH_REAL_DATA" >> $GITHUB_ENV
            else
              echo "FINAL_STATUS=SUCCESS_WITH_TEST_DATA" >> $GITHUB_ENV
            fi
          else
            echo "FINAL_STATUS=ISSUES_DETECTED" >> $GITHUB_ENV
          fiecho "📊 System Summary:"
          echo "- Real Data Sources: ${REAL_DATA_FOUND:-false}"
          echo "- Validation Issues: ${VALIDATION_ISSUES:-0}"
          echo "- Mode: $MODE"
          echo "- Environment: $ENVIRONMENT"
          
          echo ""
          echo "📁 Available Artifacts:"
          echo "- Complete execution logs and error logs"
          echo "- Generated summary reports"
          echo "- Contact data and campaign files"
          echo "- System utilities and configuration"
          
          echo ""

