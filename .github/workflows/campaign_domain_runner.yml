            echo "### Execution Log Summary" >> "$REPORT_FILE"
            echo '```' >> "$REPORT_FILE"
            tail -20 campaign_execution.log >> "$REPORT_FILE"
            echo '```' >> "$REPORT_FILE"
          fi
          
          echo "📋 Campaign report generated: $REPORT_FILE"
          
          # Save report as artifact
          mkdir -p reports
          cp "$REPORT_FILE" "reports/"

      - name: Send completion notification
        if: always()
        run: |
          echo "📧 Sending completion notification..."
          
          STATUS="SUCCESS"
          if [ "${{ env.VALIDATION_FAILED }}" == "true" ] || [ "${{ env.CRITICAL_ERROR }}" == "true" ]; then
            STATUS="FAILED"
          elif [ "${{ env.SCRIPT_FAILED }}" == "true" ] || [ "${{ env.FEEDBACK_WARNING }}" == "true" ]; then
            STATUS="COMPLETED_WITH_WARNINGS"
          fi
          
          echo "Final Status: $STATUS"
          echo "FINAL_STATUS=$STATUS" >> $GITHUB_ENV
          
          # Log completion details
          echo "🏁 Campaign workflow completed"
          echo "📊 Final execution status: $STATUS"
          echo "🕒 Total execution time: $(($(date +%s) - $(date -d "$WORKFLOW_START_TIME" +%s))) seconds"
          echo "🔗 Workflow URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          if [ "$STATUS" == "SUCCESS" ]; then
            echo "✅ All campaign operations completed successfully"
          elif [ "$STATUS" == "COMPLETED_WITH_WARNINGS" ]; then
            echo "⚠️ Campaign operations completed with warnings - review logs"
          else
            echo "❌ Campaign operations failed - immediate attention required"
          fi

      - name: Cleanup temporary files
        if: always()
        run: |
          echo "🧹 Cleaning up temporary files..."
          
          # Remove large log files if not needed
          if [ -f "campaign_execution.log" ] && [ $(wc -l < campaign_execution.log) -gt 1000 ]; then
            echo "📝 Truncating large log file"
            tail -500 campaign_execution.log > campaign_execution_truncated.log
            mv campaign_execution_truncated.log campaign_execution.log
          fi
          
          # Clean up any temporary Python cache
          find . -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
          find . -name "*.pyc" -delete 2>/dev/null || true
          
          # Preserve important artifacts
          echo "📦 Preserving important artifacts:"
          ls -la tracking/ 2>/dev/null || echo "No tracking directory"
          ls -la reports/ 2>/dev/null || echo "No reports directory"
          
          echo "✅ Cleanup completed"
