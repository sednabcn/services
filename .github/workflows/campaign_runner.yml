name: Email Campaign System
on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no emails sent)'
        required: false
        default: 'true'
        type: boolean
      campaign_filter:
        description: 'Filter campaigns (optional)'
        required: false
        default: ''
        type: string
      force_remote_mode:
        description: 'Force remote-only mode'
        required: false
        default: 'false'
        type: boolean
  schedule:
    - cron: "0 8 * * *"   # Daily at 08:00 UTC

permissions:
  contents: read
  issues: write
  actions: write

jobs:
  campaign-runner:
    runs-on: ubuntu-latest
    env:
      ALERT_EMAIL: alerts@modelphysmat.com
      GITHUB_ACTIONS: true  # Ensure remote mode detection
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          
      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          
          # Install core dependencies that are likely available
          pip install requests pandas python-docx
          
          # Try to install from requirements.txt if it exists
          if [ -f requirements.txt ]; then
            echo "Installing from requirements.txt..."
            pip install -r requirements.txt || echo "Some packages from requirements.txt failed to install, continuing..."
          else
            echo "No requirements.txt found, using basic dependencies"
          fi
          
          # Show what's installed
          echo "Installed packages:"
          pip list | grep -E "(requests|pandas|python-docx|smtplib)"

      - name: Setup Google credentials (safe + strict check)
        env:
          GOOGLE_SVC_JSON: ${{ secrets.GOOGLE_SVC_JSON }}
        if: ${{ env.GOOGLE_SVC_JSON != '' }}
        run: |
          set -euo pipefail
          
          SECRET="$GOOGLE_SVC_JSON"

          # Detect raw JSON vs base64
          if echo "$SECRET" | head -c 1 | grep -q '{'; then
          echo "✅ Secret looks like raw JSON"
          echo "$SECRET" > /tmp/google_svc.json
          else
          echo "✅ Secret looks like base64, decoding..."
          echo "$SECRET" | base64 -d > /tmp/google_svc.json
          fi
          
          chmod 600 /tmp/google_svc.json

          # Validate JSON structure
          if command -v jq >/dev/null 2>&1; then
          echo "🔎 Validating JSON structure..."
          jq . /tmp/google_svc.json >/dev/null
          
          for key in type project_id client_email client_id; do
          if ! jq -e --arg k "$key" 'has($k)' /tmp/google_svc.json >/dev/null; then
          echo "❌ Missing required field: $key"
          exit 1
          fi
          done
          echo "✅ JSON contains all required fields"
          else
          echo "⚠️ jq not installed, skipping validation"
          fi

          # Debug mode: show safe preview (never private key)
          echo "🔎 Preview of service account JSON:"
          grep -E '"(type|project_id|client_email|client_id)"' /tmp/google_svc.json || true
          
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/google_svc.json" >> $GITHUB_ENV
     
      - name: Setup directories
        run: |
          mkdir -p campaign-templates
          mkdir -p scheduled-campaigns  
          mkdir -p contacts
          mkdir -p tracking
          echo "Directory structure created"
          
      - name: Setup Google credentials
        if: ${{ env.GOOGLE_SVC_JSON != '' }}
        run: |
          echo '${{ env.GOOGLE_SVC_JSON }}' | base64 -d > docs/google_svc.json
          chmod 600 docs/google_svc.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/docs/google_svc.json" >> $GITHUB_ENV
          
      - name: Validate environment and dependencies
        run: |
          echo "=== Environment Validation ==="
          echo "Python version: $(python --version)"
          echo "Current directory: $(pwd)"
          echo "GitHub Actions: $GITHUB_ACTIONS"
          echo "CI Environment: $CI"
          
          echo "=== Directory Structure ==="
          ls -la
          
          echo "=== Campaign Templates ==="
          find campaign-templates -type f 2>/dev/null || echo "No campaign templates found"
          
          echo "=== Scheduled Campaigns ==="  
          ls -la scheduled-campaigns/ 2>/dev/null || echo "No scheduled campaigns directory"
          if [ -d scheduled-campaigns ]; then
            find scheduled-campaigns -type f -name "*.docx" -o -name "*.txt" -o -name "*.html" -o -name "*.md" -o -name "*.json" 2>/dev/null || echo "No campaign files found"
          fi
          
          echo "=== Contacts ==="
          ls -la contacts/ 2>/dev/null || echo "No contacts directory"
          if [ -d contacts ]; then
            find contacts -type f -name "*.csv" -o -name "*.xlsx" -o -name "*.docx" -o -name "*.txt" -o -name "*.url" 2>/dev/null || echo "No contact files found"
          fi
          
          echo "=== Python Dependencies ==="
          python -c "
          import sys
          modules = ['requests', 'pandas', 'docx', 'csv', 'json', 'smtplib']
          for module in modules:
              try:
                  __import__(module)
                  print(f'✓ {module} - Available')
              except ImportError as e:
                  print(f'✗ {module} - Missing: {e}')
          "
          
          echo "=== Email Sender Module ==="
          python -c "
          try:
              from email_sender import EmailSender
              print('✓ email_sender module - Available')
          except ImportError as e:
              print('⚠ email_sender module - Using fallback:', e)
          "
          
      - name: Process contact sources
        run: |
          echo "=== Processing Contact Sources ==="
          if [ -d "contacts" ]; then
            for file in contacts/*; do
              if [ -f "$file" ]; then
                echo "Found contact file: $file"
                case "$file" in
                  *.url)
                    echo "  Type: URL source"
                    echo "  Content: $(cat "$file" 2>/dev/null || echo 'Unable to read')"
                    ;;
                  *.csv)
                    echo "  Type: CSV file"
                    echo "  Lines: $(wc -l < "$file" 2>/dev/null || echo 'Unable to count')"
                    ;;
                  *.xlsx)
                    echo "  Type: Excel file"
                    ;;
                  *)
                    echo "  Type: Other ($(echo "$file" | sed 's/.*\.//'))"
                    ;;
                esac
              fi
            done
          else
            echo "No contacts directory found"
          fi
          
      - name: Test script execution
        run: |
          echo "=== Testing Script Execution ==="
          python utils/docx_parser.py --help || echo "Script help failed"
          
      - name: Run campaign processor
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'true' }}
          CAMPAIGN_FILTER: ${{ github.event.inputs.campaign_filter }}
        run: |
          echo "=== Starting Campaign Processor ==="
          echo "Mode: $(if [ "$DRY_RUN" = "true" ]; then echo "DRY-RUN"; else echo "LIVE"; fi)"
          echo "Alert Email: $ALERT_EMAIL"
          echo "Campaign Filter: $CAMPAIGN_FILTER"
          
          # Build command arguments
          ARGS="--templates campaign-templates --contacts contacts --scheduled scheduled-campaigns --tracking tracking --alerts $ALERT_EMAIL"
          
          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          
          if [ "${{ github.event.inputs.force_remote_mode }}" = "true" ]; then
            ARGS="$ARGS --remote-only"
          fi
          
          echo "Running: python utils/docx_parser.py $ARGS"
          python utils/docx_parser.py $ARGS | tee campaign_execution.log
          
      - name: Generate execution summary
        if: always()
        run: |
          echo "=== Generating Execution Summary ==="
          
          # Create summary header
          echo "## Email Campaign Execution Report - $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Show mode
          if [ "${{ github.event.inputs.dry_run || 'true' }}" = "true" ]; then
            echo "**🔍 DRY RUN MODE - No emails were sent**" >> $GITHUB_STEP_SUMMARY
          else
            echo "**📧 LIVE MODE - Emails were sent**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Show trigger information
          echo "### 🔄 Execution Details" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run ID | ${{ github.run_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Timestamp | $(date -u +"%Y-%m-%d %H:%M:%S UTC") |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Extract and show statistics
          echo "### 📊 Execution Statistics" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          
          if [ -f campaign_execution.log ]; then
            # Extract key metrics from log with better error handling
            contacts=$(grep "Total contacts loaded:" campaign_execution.log | tail -1 | awk '{print $4}' || echo "0")
            unique_contacts=$(grep "Unique contacts:" campaign_execution.log | tail -1 | awk '{print $3}' || echo "0") 
            campaigns=$(grep "Campaigns processed:" campaign_execution.log | tail -1 | awk '{print $3}' || echo "0")
            total_emails=$(grep "Total emails:" campaign_execution.log | tail -1 | awk '{print $3}' || echo "0")
            successful=$(grep "Successful:" campaign_execution.log | tail -1 | awk '{print $2}' || echo "0")
            failed=$(grep "Failed:" campaign_execution.log | tail -1 | awk '{print $2}' || echo "0")
            
            echo "| Total Contacts Loaded | $contacts |" >> $GITHUB_STEP_SUMMARY
            echo "| Unique Contacts | $unique_contacts |" >> $GITHUB_STEP_SUMMARY
            echo "| Campaigns Processed | $campaigns |" >> $GITHUB_STEP_SUMMARY
            echo "| Total Emails | $total_emails |" >> $GITHUB_STEP_SUMMARY
            echo "| Successful | $successful |" >> $GITHUB_STEP_SUMMARY
            echo "| Failed | $failed |" >> $GITHUB_STEP_SUMMARY
            
            # Calculate success rate if applicable
            if [ "$total_emails" != "0" ]; then
              success_rate=$(python3 -c "print(f'{($successful / $total_emails * 100):.1f}%')" 2>/dev/null || echo "N/A")
              echo "| Success Rate | $success_rate |" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "| Status | No execution log found |" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "| Mode | ${{ github.event.inputs.dry_run == 'true' && 'DRY-RUN' || 'LIVE' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Show campaign details
          echo "### 📋 Campaign Details" >> $GITHUB_STEP_SUMMARY
          if [ -f campaign_execution.log ] && grep -q "Campaign.*completed:" campaign_execution.log; then
            echo "| Campaign | Status | Details |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|---------|---------|" >> $GITHUB_STEP_SUMMARY
            
            # Extract campaign completion messages
            grep "Campaign.*completed:" campaign_execution.log | while read -r line; do
              campaign=$(echo "$line" | sed "s/.*Campaign '\([^']*\)'.*/\1/")
              echo "| $campaign | Completed | See logs for details |" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "No campaigns were processed or completed." >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Show any errors
          if [ -f campaign_execution.log ] && grep -q "ERROR\|Error\|Failed" campaign_execution.log; then
            echo "### ⚠️ Issues Detected" >> $GITHUB_STEP_SUMMARY
            echo "```" >> $GITHUB_STEP_SUMMARY
            grep -i "error\|warning\|failed" campaign_execution.log | head -10 >> $GITHUB_STEP_SUMMARY
            echo "```" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Add resource links
          echo "### 🔗 Resources" >> $GITHUB_STEP_SUMMARY
          echo "- [Full Execution Log](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          echo "- [Repository](https://github.com/${{ github.repository }})" >> $GITHUB_STEP_SUMMARY
          echo "- Tracking data: \`tracking/\` directory" >> $GITHUB_STEP_SUMMARY
          echo "- Contact sources: \`contacts/\` directory" >> $GITHUB_STEP_SUMMARY
          echo "- Campaign templates: \`campaign-templates/\` directory" >> $GITHUB_STEP_SUMMARY
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: campaign-execution-${{ github.run_id }}
          path: |
            campaign_execution.log
            *.log  
            tracking/
            dryrun.log
            error.log
          retention-days: 30
          
      - name: Check for critical failures
        if: always()
        run: |
          echo "=== Checking for Critical Failures ==="
          
          # Check if script completed successfully
          if ! grep -q "Script completed successfully" campaign_execution.log; then
            echo "::warning::Script did not complete successfully"
            echo "SCRIPT_FAILED=true" >> $GITHUB_ENV
          fi
          
          # Check for critical errors
          if grep -q "ERROR:" campaign_execution.log || [ -f error.log ]; then
            echo "::error::Critical errors detected in execution"
            echo "CRITICAL_ERROR=true" >> $GITHUB_ENV
          fi
          
          # Check if no campaigns were processed in live mode
          if [ "${{ github.event.inputs.dry_run || 'true' }}" != "true" ] && ! grep -q "campaigns processed:" campaign_execution.log; then
            echo "::warning::No campaigns were processed in live mode"
            echo "NO_CAMPAIGNS=true" >> $GITHUB_ENV
          fi
          
      - name: Create issue on failure
        if: failure() || (always() && env.CRITICAL_ERROR == 'true' && github.event_name == 'schedule')
        uses: actions/github-script@v6
        with:
          script: |
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const timestamp = new Date().toISOString();
            
            // Determine issue title and severity
            const isScheduled = '${{ github.event_name }}' === 'schedule';
            const hasCriticalError = '${{ env.CRITICAL_ERROR }}' === 'true';
            const title = isScheduled ? 
              `🚨 Scheduled Campaign Failed - ${timestamp.split('T')[0]}` :
              `⚠️ Campaign Execution Issue - ${timestamp.split('T')[0]}`;
            
            const body = `
            ## Campaign Execution ${hasCriticalError ? 'Failed' : 'Issue Detected'}
            
            **Execution Details:**
            - **Run ID**: [${{ github.run_id }}](${runUrl})
            - **Trigger**: ${{ github.event_name }}
            - **Mode**: ${{ github.event.inputs.dry_run == 'true' && 'DRY-RUN' || 'LIVE' }}
            - **Branch**: ${{ github.ref_name }}
            - **Timestamp**: ${timestamp}
            
            **Issue Type**: ${hasCriticalError ? 'Critical Error' : 'Workflow Failure'}
            
            **Immediate Actions Needed:**
            1. 🔍 [Review the workflow logs](${runUrl})
            2. 🔧 Check repository secrets (SMTP configuration)
            3. 📁 Verify contact sources in \`contacts/\` directory
            4. 📝 Validate campaign files in \`scheduled-campaigns/\` directory
            5. 🐛 Check for dependency issues
            
            **System Information:**
            - Python dependencies: Check workflow logs for installation status
            - EmailSender module: May be using fallback mode
            - Contact parsing: Verify all file formats are supported
            
            ${isScheduled ? '**Note**: This was a scheduled execution failure and requires immediate attention.' : ''}
            
            ---
            *This issue was automatically created by the campaign system monitoring.*
            `;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: isScheduled ? 
                ['automation', 'campaign-failure', 'urgent', 'scheduled'] :
                ['automation', 'campaign-issue', 'investigation-needed']
            });
            
      - name: Cleanup sensitive data
        if: always()
        run: |
          echo "=== Cleaning Up ==="
          rm -f docs/google_svc.json
          rm -f .env
          echo "Cleanup completed"
