name: Email GitHub Campaign System (DRY-RUN)

on:
    push:
      branches: ["master"]
  workflow_dispatch:

jobs:
  dry-run:
    runs-on: ubuntu-latest
    env:
      ALERT_EMAIL: alerts@modelphysmat.com
      TRACKING_DIR: tracking
      SCHEDULED_DIR: scheduled-campaigns
      TEMPLATES_DIR: campaign-templates
      CONTACTS_DIR: contacts

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: Dry Run Campaign Processor
        run: |
          python utils/docx_parser.py \
            --templates "$TEMPLATES_DIR" \
            --contacts "$CONTACTS_DIR" \
            --scheduled "$SCHEDULED_DIR" \
            --tracking "$TRACKING_DIR" \
            --alerts "$ALERT_EMAIL" \
            --dry-run

      - name: Generate Summary
        run: |
          echo "## 📋 Dry-Run Campaign Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campaign | Recipients | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------------|--------|" >> $GITHUB_STEP_SUMMARY
          grep "Campaign:" dryrun.log | while read -r line; do
            campaign=$(echo "$line" | awk '{print $2}')
            recipients=$(grep -A1 "$line" dryrun.log | tail -n1 | awk '{print $2}')
            echo "| $campaign | $recipients | SIMULATED |" >> $GITHUB_STEP_SUMMARY
          done
