name: Production Email Campaign System - Integrated with Your Scripts

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no emails sent)'
        required: false
        default: 'false'
        type: boolean
      target_domain:
        description: 'Target domain for campaigns'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - 'education'
          - 'finance'
          - 'healthcare'
          - 'industry'
          - 'technology'
          - 'government'
      campaign_filter:
        description: 'Filter specific campaigns'
        required: false
        default: ''
        type: string
      contact_source:
        description: 'Specific contact source to use'
        required: false
        default: ''
        type: string
      force_validation:
        description: 'Force full data validation'
        required: false
        default: true
        type: boolean
      enable_real_time_tracking:
        description: 'Enable real-time email tracking'
        required: false
        default: true
        type: boolean
      debug_mode:
        description: 'Enable debug logging'
        required: false
        default: false
        type: boolean
      batch_size:
        description: 'Email batch size for processing'
        required: false
        default: '50'
        type: string
      delay_between_batches:
        description: 'Delay between batches (seconds)'
        required: false
        default: '5'
        type: string
  schedule:
    - cron: "0 9 * * 1-5"   # Weekdays at 9 AM UTC

permissions:
  contents: read
  issues: write
  actions: write
  packages: write

env:
  ALERT_EMAIL: alerts@modelphysmat.com
  FEEDBACK_EMAIL: feedback@modelphysmat.com
  PYTHON_VERSION: '3.11'
  PRODUCTION_MODE: true

jobs:
  validate-and-prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      validation_status: ${{ steps.validation.outputs.status }}
      contact_count: ${{ steps.contact_analysis.outputs.count }}
      domain_campaigns: ${{ steps.domain_analysis.outputs.campaigns }}
      validation_report: ${{ steps.validation.outputs.report }}
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python environment
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies with enhanced packages
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install requests>=2.31.0 pandas>=2.0.0 python-docx>=0.8.11
          pip install openpyxl>=3.1.0 xlrd>=2.0.1 jinja2>=3.1.0
          pip install google-auth google-auth-oauthlib google-auth-httplib2
          pip install google-api-python-client>=2.0.0 PyGithub>=1.55
          pip install gspread>=5.0.0 oauth2client>=4.1.0
          pip install beautifulsoup4 lxml
          
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Setup Google credentials
        env:
          GOOGLE_SVC_JSON: ${{ secrets.GOOGLE_SVC_JSON }}
        if: ${{ env.GOOGLE_SVC_JSON != '' }}
        run: |
          echo "$GOOGLE_SVC_JSON" | base64 -d > /tmp/google_svc.json
          chmod 600 /tmp/google_svc.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/google_svc.json" >> $GITHUB_ENV

      - name: Validate system configuration using YOUR scripts
        id: validation
        run: |
          echo "Running system validation using your existing scripts..."
          
          overall_status=0
          validation_report="# System Validation Report\n\n"
          
          # Check if your main scripts exist and can import
          echo "Checking for your email campaign scripts..."
          
          if [ -f "email_campaign_system.py" ]; then
            echo "✅ Found email_campaign_system.py"
            python -c "import sys; sys.path.append('.'); \
try: from email_campaign_system import ContactParser, EmailSender, campaign_main; \
print('✅ email_campaign_system.py imports successfully'); \
print('  - ContactParser class available'); \
print('  - EmailSender class available'); \
print('  - campaign_main function available') \
except Exception as e: \
print(f'❌ Import error: {e}'); sys.exit(1)" || { overall_status=1; echo "❌ email_campaign_system.py import failed"; }
            validation_report+="## Main Campaign System: $([ $overall_status -eq 0 ] && echo 'PASSED' || echo 'FAILED')\n"
          else
            echo "❌ email_campaign_system.py not found"
            overall_status=1
            validation_report+="## Main Campaign System: FAILED - File not found\n"
          fi
          
          if [ -f "email_sender.py" ]; then
            echo "✅ Found email_sender.py"
            python -c "
import sys
sys.path.append('.')
try:
    from email_sender import EmailSender
    sender = EmailSender(dry_run=True)
    print('✅ email_sender.py imports and initializes successfully')
except Exception as e:
    print(f'⚠️ Email sender warning: {e}')
"
            validation_report+="## Email Sender: PASSED\n"
          else
            echo "❌ email_sender.py not found"
            overall_status=1
            validation_report+="## Email Sender: FAILED - File not found\n"
          fi
          
          if [ -f "email_feedback_injector.py" ]; then
            echo "✅ Found email_feedback_injector.py"
            python -c "
import sys
sys.path.append('.')
try:
    from email_feedback_injector import EmailFeedbackInjector
    injector = EmailFeedbackInjector()
    print('✅ email_feedback_injector.py works')
except Exception as e:
    print(f'⚠️ Feedback injector warning: {e}')
"
            validation_report+="## Feedback System: PASSED\n"
          else
            echo "⚠️ email_feedback_injector.py not found"
            validation_report+="## Feedback System: WARNING - File not found\n"
          fi
          
          if [ -f "docx_feedback_processor.py" ]; then
            echo "✅ Found docx_feedback_processor.py"
            python -c "
import sys
sys.path.append('.')
try:
    from docx_feedback_processor import DOCXFeedbackProcessor
    processor = DOCXFeedbackProcessor()
    print('✅ docx_feedback_processor.py works')
except Exception as e:
    print(f'⚠️ DOCX processor warning: {e}')
"
            validation_report+="## DOCX Processor: PASSED\n"
          else
            echo "⚠️ docx_feedback_processor.py not found"
            validation_report+="## DOCX Processor: WARNING - File not found\n"
          fi
          
          if [ -f "reply_tracker.py" ]; then
            echo "✅ Found reply_tracker.py"
            python -c "
import sys
sys.path.append('.')
try:
    from reply_tracker import ReplyTracker
    print('✅ reply_tracker.py imports successfully')
except Exception as e:
    print(f'⚠️ Reply tracker warning: {e}')
"
            validation_report+="## Reply Tracker: PASSED\n"
          else
            echo "⚠️ reply_tracker.py not found"
            validation_report+="## Reply Tracker: WARNING - File not found\n"
          fi
          
          # Directory structure validation and auto-creation
          echo "Validating and creating directory structure..."
          missing_dirs=()
          for dir in "contacts" "campaign-templates" "scheduled-campaigns" "tracking"; do
            if [ ! -d "$dir" ]; then
              missing_dirs+=("$dir")
              mkdir -p "$dir"
              echo "📁 Created missing directory: $dir"
            fi
          done
          
          # Create subdirectories for better organization
          mkdir -p tracking/{feedback_responses,domain_stats,execution_logs,batch_reports}
          mkdir -p campaign-templates/{education,finance,healthcare,industry,technology,government}
          mkdir -p contacts/{csv,excel,docx,urls}
          
          if [ ${#missing_dirs[@]} -eq 0 ]; then
            validation_report+="## Directory Structure: PASSED\n"
          else
            validation_report+="## Directory Structure: FIXED - Created missing dirs: ${missing_dirs[*]}\n"
          fi
          
          validation_report+="\n## Overall Status: $([ $overall_status -eq 0 ] && echo 'PASSED' || echo 'FAILED')\n"
          
          echo "status=$overall_status" >> $GITHUB_OUTPUT
          echo "report<<EOF" >> $GITHUB_OUTPUT
          echo -e "$validation_report" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Overall validation status: $overall_status"

      - name: Analyze contact sources using YOUR email_campaign_system
        id: contact_analysis
        run: |
          echo "Analyzing contact sources using YOUR email_campaign_system.py..."
          
          python -c "
import sys
import os
import json
from datetime import datetime
sys.path.append('.')

try:
    from email_campaign_system import ContactParser
    
    print('Using YOUR existing email_campaign_system.py ContactParser')
    parser = ContactParser()
    
    # Load contacts from your contacts directory
    contacts = parser.parse_contacts_directory('contacts')
    print(f'Successfully loaded {len(contacts)} contacts using YOUR ContactParser')
    
    # Analyze sources
    sources = {}
    domains = {}
    contact_types = {}
    
    for contact in contacts:
        # Source analysis
        source = contact.get('source', 'unknown')
        sources[source] = sources.get(source, 0) + 1
        
        # Domain analysis
        email = contact.get('email', '').lower()
        if '@' in email:
            domain = email.split('@')[-1]
            domains[domain] = domains.get(domain, 0) + 1
            
        # Contact type analysis
        if 'extracted_from' in contact:
            contact_types[contact['extracted_from']] = contact_types.get(contact['extracted_from'], 0) + 1
    
    # Save comprehensive analysis
    analysis = {
        'total_contacts': len(contacts),
        'sources_breakdown': sources,
        'domain_breakdown': domains,
        'contact_types': contact_types,
        'top_domains': sorted(domains.items(), key=lambda x: x[1], reverse=True)[:10],
        'sample_contacts': contacts[:3] if contacts else [],
        'loaded_with': 'YOUR_email_campaign_system.py',
        'analysis_timestamp': datetime.now().isoformat(),
        'contact_source_filter': '${{ github.event.inputs.contact_source }}' if '${{ github.event.inputs.contact_source }}' else 'all_sources'
    }
    
    with open('contact_analysis.json', 'w') as f:
        json.dump(analysis, f, indent=2, default=str)
    
    print(f'Contact analysis complete:')
    print(f'  - Total contacts: {len(contacts)}')
    print(f'  - Sources: {len(sources)}')
    print(f'  - Domains: {len(domains)}')
    print(f'  - Top domain: {max(domains.items(), key=lambda x: x[1])[0] if domains else \"none\"}')
    
    print(f'::set-output name=count::{len(contacts)}')
    
    if len(contacts) == 0:
        print('::warning::No contacts loaded - check your contacts directory and files')
        # List files in contacts directory for debugging
        if os.path.exists('contacts'):
            files = os.listdir('contacts')
            print(f'Files found in contacts/: {files}')
    
except ImportError as e:
    print(f'❌ Import error with YOUR email_campaign_system.py: {e}')
    print(f'::set-output name=count::0')
    with open('contact_analysis.json', 'w') as f:
        json.dump({'error': f'Import failed: {e}', 'total_contacts': 0}, f)
    
except Exception as e:
    print(f'❌ Error with YOUR email_campaign_system.py: {e}')
    print(f'::set-output name=count::0')
    with open('contact_analysis.json', 'w') as f:
        json.dump({'error': str(e), 'total_contacts': 0}, f)
"

      - name: Analyze campaign templates and domains
        id: domain_analysis
        run: |
          echo "Analyzing campaign templates and domain structure..."
          
          python -c "
import sys
import json
import os
from pathlib import Path
from datetime import datetime

# Count templates in each domain directory
domains = ['education', 'finance', 'healthcare', 'industry', 'technology', 'government']
domain_stats = {}
total_templates = 0

templates_dir = Path('campaign-templates')
if templates_dir.exists():
    print('Analyzing campaign templates...')
    
    # Check domain-based structure
    for domain in domains:
        domain_path = templates_dir / domain
        if domain_path.exists():
            docx_files = list(domain_path.glob('*.docx'))
            doc_files = list(domain_path.glob('*.doc')) 
            json_files = list(domain_path.glob('*.json'))
            txt_files = list(domain_path.glob('*.txt'))
            html_files = list(domain_path.glob('*.html'))
            
            all_templates = docx_files + doc_files + json_files + txt_files + html_files
            
            domain_stats[domain] = {
                'template_count': len(all_templates),
                'docx_count': len(docx_files),
                'json_count': len(json_files),
                'other_count': len(doc_files + txt_files + html_files),
                'templates': [t.name for t in all_templates]
            }
            total_templates += len(all_templates)
            
            print(f'  - {domain}: {len(all_templates)} templates')
        else:
            domain_stats[domain] = {'template_count': 0, 'templates': []}
    
    # Check root level templates
    root_templates = []
    for ext in ['*.docx', '*.doc', '*.json', '*.txt', '*.html']:
        root_templates.extend(list(templates_dir.glob(ext)))
    
    if root_templates:
        domain_stats['_root'] = {
            'template_count': len(root_templates),
            'templates': [t.name for t in root_templates]
        }
        total_templates += len(root_templates)
        print(f'  - Root level: {len(root_templates)} templates')
    
    print(f'Total templates found: {total_templates}')
else:
    print('campaign-templates directory not found')

# Check scheduled campaigns
scheduled_dir = Path('scheduled-campaigns')
scheduled_campaigns = 0
if scheduled_dir.exists():
    for ext in ['*.json', '*.docx', '*.txt', '*.html']:
        scheduled_campaigns += len(list(scheduled_dir.glob(ext)))

domain_analysis = {
    'domain_count': len([d for d in domain_stats.values() if d['template_count'] > 0]),
    'template_count': total_templates,
    'scheduled_campaigns': scheduled_campaigns,
    'domains': domain_stats,
    'analysis_method': 'direct_filesystem_scan',
    'analysis_timestamp': datetime.now().isoformat(),
    'target_domain_filter': '${{ github.event.inputs.target_domain }}' if '${{ github.event.inputs.target_domain }}' else 'all_domains'
}

with open('domain_analysis.json', 'w') as f:
    json.dump(domain_analysis, f, indent=2)

print(f'::set-output name=campaigns::{total_templates}')
print(f'Domain analysis completed: {total_templates} templates across {len([d for d in domain_stats.values() if d[\"template_count\"] > 0])} active domains')
"

      - name: Create sample test data if directories are empty
        run: |
          echo "Checking for test data and creating samples if needed..."
          
          # Create sample contact data if contacts directory is empty
          if [ ! "$(ls -A contacts 2>/dev/null)" ]; then
            echo "Creating sample contact data..."
            
            cat > contacts/sample_contacts.csv << EOF
name,email,organization,role
John Doe,john.doe@example.com,Example Corp,Manager
Jane Smith,jane.smith@test.org,Test Organization,Director
Bob Johnson,bob.johnson@sample.net,Sample Company,Analyst
Alice Brown,alice.brown@demo.edu,Demo University,Professor
EOF
            
            echo "Sample contacts created in contacts/sample_contacts.csv"
          fi
          
          # Create sample campaign template if templates directory is empty  
          if [ ! "$(find campaign-templates -name '*.json' -o -name '*.docx' 2>/dev/null)" ]; then
            echo "Creating sample campaign template..."
            
            mkdir -p campaign-templates/education
            cat > campaign-templates/education/sample_campaign.json << EOF
{
  "name": "Sample Education Campaign",
  "subject": "Educational Partnership Opportunity",
  "content": "Dear {{name}},\n\nI hope this message finds you well. We are reaching out regarding a potential educational partnership opportunity that aligns with your institution's mission.\n\nWe believe there could be mutual benefits in exploring collaboration opportunities between our organizations.\n\nWould you be interested in discussing this further?\n\nBest regards,\nThe Partnership Team",
  "from_name": "Partnership Team",
  "metadata": {
    "domain": "education",
    "campaign_type": "partnership",
    "priority": "medium"
  }
}
EOF
            
            echo "Sample campaign template created in campaign-templates/education/"
          fi
          
          # Create sample scheduled campaign if directory is empty
          if [ ! "$(ls -A scheduled-campaigns 2>/dev/null)" ]; then
            echo "Creating sample scheduled campaign..."
            
            cat > scheduled-campaigns/test_campaign.json << EOF
{
  "name": "Test Campaign",
  "subject": "Test Email Campaign - {{name}}",
  "content": "Hello {{name}},\n\nThis is a test email campaign sent to {{email}}.\n\nBest regards,\nTest Team",
  "from_name": "Test Team",
  "metadata": {
    "campaign_type": "test",
    "created": "$(date -Iseconds)"
  }
}
EOF
            
            echo "Sample scheduled campaign created"
          fi

      - name: Upload validation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: validation-results-${{ github.run_id }}
          path: |
            contact_analysis.json
            domain_analysis.json
            *.log
          retention-days: 7

      - name: Report validation summary
        run: |
          echo "### Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.validation.outputs.report }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Contacts Found:** ${{ steps.contact_analysis.outputs.count }}" >> $GITHUB_STEP_SUMMARY
          echo "**Campaign Templates:** ${{ steps.domain_analysis.outputs.campaigns }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

  execute-campaigns:
    needs: validate-and-prepare
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: needs.validate-and-prepare.outputs.validation_status == '0'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python environment
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install requests>=2.31.0 pandas>=2.0.0 python-docx>=0.8.11
          pip install openpyxl>=3.1.0 xlrd>=2.0.1 jinja2>=3.1.0
          pip install google-auth google-auth-oauthlib google-auth-httplib2
          pip install google-api-python-client>=2.0.0 PyGithub>=1.55
          pip install gspread>=5.0.0 oauth2client>=4.1.0
          pip install beautifulsoup4 lxml
          
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Setup credentials and configuration
        env:
          GOOGLE_SVC_JSON: ${{ secrets.GOOGLE_SVC_JSON }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: |
          if [ -n "$GOOGLE_SVC_JSON" ]; then
            echo "$GOOGLE_SVC_JSON" | base64 -d > /tmp/google_svc.json
            chmod 600 /tmp/google_svc.json
            echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/google_svc.json" >> $GITHUB_ENV
          fi
          
          # Validate email configuration using YOUR email_sender.py
          echo "Validating email configuration..."
          python -c "
import sys
sys.path.append('.')
try:
    from email_sender import EmailSender
    sender = EmailSender(dry_run=True)
    print('Email sender configuration validated successfully')
except Exception as e:
    print(f'Email sender validation issue: {e}')
    if '${{ github.event.inputs.dry_run }}' != 'true':
        print('Warning: Email issues in live mode may cause failures')
    else:
        print('Continuing in dry-run mode despite email configuration issues')
"

      - name: Setup tracking and feedback systems using YOUR scripts
        run: |
          echo "Setting up tracking and feedback systems using YOUR scripts..."
          
          # Create comprehensive tracking directory structure
          mkdir -p tracking/{feedback_responses,domain_stats,execution_logs,batch_reports,reply_tracking}
          
          # Initialize tracking with metadata
          cat > tracking/execution_start.json << EOF
{
  "workflow_run_id": "${{ github.run_id }}",
  "execution_start": "$(date -Iseconds)",
  "mode": "${{ github.event.inputs.dry_run == 'true' && 'dry-run' || 'live' }}",
  "target_domain": "${{ github.event.inputs.target_domain }}",
  "batch_size": "${{ github.event.inputs.batch_size || 50 }}",
  "real_time_tracking": "${{ github.event.inputs.enable_real_time_tracking }}",
  "debug_mode": "${{ github.event.inputs.debug_mode }}"
}
EOF
          
          # Setup email feedback injection using YOUR script
          if [ -f "email_feedback_injector.py" ]; then
            echo "Setting up feedback injection with YOUR email_feedback_injector.py..."
            python email_feedback_injector.py \
              --campaigns-dir scheduled-campaigns \
              --feedback-email "$FEEDBACK_EMAIL" \
              --setup-tracking \
              --injection-type footer_signature || echo "Feedback injector completed with warnings"
          else
            echo "email_feedback_injector.py not found - skipping feedback injection setup"
          fi
          
          # Process DOCX templates for feedback using YOUR script
          if [ -f "docx_feedback_processor.py" ]; then
            echo "Processing DOCX templates with YOUR docx_feedback_processor.py..."
            python docx_feedback_processor.py \
              --templates-dir campaign-templates \
              --feedback-email "$FEEDBACK_EMAIL" \
              --create-backups \
              --create-report || echo "DOCX processor completed with warnings"
          else
            echo "docx_feedback_processor.py not found - skipping DOCX processing"
          fi

      - name: Execute email campaigns using YOUR email_campaign_system
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: |
          echo "Executing email campaigns using YOUR email_campaign_system.py..."
          
          # Build arguments for your campaign system
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            DRY_RUN_FLAG="--dry-run"
            echo "Running in DRY-RUN mode - No emails will be sent"
          else
            echo "Running in LIVE mode - Emails will be sent"
          fi
          
          REMOTE_FLAG="--remote-only"
          
          # Execute using your main campaign system
          echo "Starting campaign execution..."
          echo "Command: python email_campaign_system.py --templates campaign-templates --contacts contacts --scheduled scheduled-campaigns --tracking tracking --alerts $ALERT_EMAIL $DRY_RUN_FLAG $REMOTE_FLAG"
          
          python email_campaign_system.py \
            --templates campaign-templates \
            --contacts contacts \
            --scheduled scheduled-campaigns \
            --tracking tracking \
            --alerts "$ALERT_EMAIL" \
            $DRY_RUN_FLAG \
            $REMOTE_FLAG \
            2>&1 | tee campaign_execution.log
          
          EXECUTION_STATUS=${PIPESTATUS[0]}
          echo "Campaign execution completed with status: $EXECUTION_STATUS"
          echo "EXECUTION_STATUS=$EXECUTION_STATUS" >> $GITHUB_ENV
          
          # Save execution metadata
          cat > execution_metadata.json << EOF
{
  "execution_status": $EXECUTION_STATUS,
  "mode": "${{ github.event.inputs.dry_run == 'true' && 'dry-run' || 'live' }}",
  "target_domain": "${{ github.event.inputs.target_domain }}",
  "contacts_processed": "${{ needs.validate-and-prepare.outputs.contact_count }}",
  "templates_available": "${{ needs.validate-and-prepare.outputs.domain_campaigns }}",
  "execution_time": "$(date -Iseconds)",
  "workflow_run_id": "${{ github.run_id }}",
  "processed_with": "YOUR_email_campaign_system.py",
  "command_used": "email_campaign_system.py with remote-only flag"
}
EOF

      - name: Process real-time feedback using YOUR scripts
        if: github.event.inputs.enable_real_time_tracking == 'true'
        run: |
          echo "Processing real-time feedback using YOUR scripts..."
          
          # Use your reply tracker if it exists
          if [ -f "reply_tracker.py" ]; then
            echo "Running YOUR reply_tracker.py for real-time feedback..."
            python -c "
import sys
import json
from datetime import datetime
sys.path.append('.')

try:
    from reply_tracker import ReplyTracker
    
    # Initialize with environment variables or defaults
    tracker = ReplyTracker(
        imap_host='${{ secrets.IMAP_HOST }}' or None,
        imap_user='${{ secrets.IMAP_USER }}' or None,
        imap_pass='${{ secrets.IMAP_PASS }}' or None,
        mark_seen=False  # Don't mark as seen in production
    )
    
    print('Fetching replies with YOUR ReplyTracker...')
    replies = tracker.fetch_replies()
    
    print(f'Processed {len(replies)} replies')
    
    # Analyze replies
    bounces = [r for r in replies if r.get('bounce', False)]
    feedback_replies = [r for r in replies if r.get('tid') and not r.get('bounce', False)]
    
    # Save comprehensive reply analysis
    reply_analysis = {
        'total_replies': len(replies),
        'bounces': len(bounces),
        'feedback_replies': len(feedback_replies),
        'processing_time': datetime.now().isoformat(),
        'workflow_run_id': '${{ github.run_id }}',
        'bounce_emails': [r.get('from', '') for r in bounces][:10],  # First 10 for debugging
        'feedback_emails': [r.get('from', '') for r in feedback_replies][:10]
