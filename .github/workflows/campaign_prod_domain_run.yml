status_emoji = '✅' if execution_status == '0' else '❌' if execution_status == '1' else '⚠️'

title = f'Campaign Execution Report - Run ${{ github.run_id }} {status_emoji}'
body = f'''# Email Campaign Execution Report

**Workflow Run ID:** ${{ github.run_id }}  
**Status:** {status_emoji} {execution_status}  
**Mode:** ${{ github.event.inputs.dry_run == 'true' && 'DRY-RUN' || 'LIVE' }}  
**Contacts Processed:** ${{ needs.validate-and-prepare.outputs.contact_count }}  
**Templates Available:** ${{ needs.validate-and-prepare.outputs.domain_campaigns }}  
