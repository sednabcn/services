  cleanup:
    needs: [validate-and-prepare, execute-campaigns]
    runs-on: ubuntu-latest
    if: always()
    timeout-minutes: 10
    
    steps:
      - name: Cleanup sensitive data and temporary files
        run: |
          echo "🧹 Cleaning up sensitive data and temporary files..."
          
          # Remove credential files
          echo "Removing credential files..."
          rm -f /tmp/google_svc.json
          rm -f .env
          rm -f *.key
          rm -f *.pem
          
          # Clear cached credentials
          echo "Clearing cached credentials..."
          if [ -d ~/.cache ]; then
            find ~/.cache -name "*credential*" -delete 2>/dev/null || true
            find ~/.cache -name "*token*" -delete 2>/dev/null || true
          fi
          
          # Clear Python cache
          echo "Clearing Python cache..."
          find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          find . -name "*.pyc" -delete 2>/dev/null || true
          
          # Clean up temporary tracking files (keep permanent logs)
          echo "Cleaning temporary tracking files..."
          if [ -d tracking ]; then
            find tracking -name "*.tmp" -delete 2>/dev/null || true
            find tracking -name "*temp*" -delete 2>/dev/null || true
          fi
          
          # Clear environment variables that might contain sensitive data
          unset GOOGLE_SVC_JSON
          unset SMTP_PASS
          unset GITHUB_TOKEN
          
          echo "✅ Cleanup completed successfully"
          
      - name: Generate cleanup report
        run: |
          echo "📋 CLEANUP SUMMARY" >> cleanup_report.md
          echo "==================" >> cleanup_report.md
          echo "" >> cleanup_report.md
          echo "**Cleanup Date:** $(date)" >> cleanup_report.md
          echo "**Workflow Run:** ${{ github.run_id }}" >> cleanup_report.md
          echo "" >> cleanup_report.md
          echo "### Files Removed:" >> cleanup_report.md
          echo "- Temporary credential files" >> cleanup_report.md
          echo "- Python cache files" >> cleanup_report.md
          echo "- Temporary tracking files" >> cleanup_report.md
          echo "" >> cleanup_report.md
          echo "### Security Measures:" >> cleanup_report.md
          echo "- Environment variables cleared" >> cleanup_report.md
          echo "- Cache directories cleaned" >> cleanup_report.md
          echo "- Sensitive data purged" >> cleanup_report.md
          echo "" >> cleanup_report.md
          echo "✅ **Status:** Cleanup completed successfully" >> cleanup_report.md
          
          echo "🔒 Security cleanup completed for workflow run ${{ github.run_id }}"
