## Artifacts
View full results and logs in GitHub Actions artifacts for run ${{ github.run_id }}.

## Next Steps
Based on execution status:
''' + ('- Review successful execution metrics\\n- Consider scaling up campaigns\\n- Analyze feedback responses' if execution_status == '0' else '- Check execution logs for errors\\n- Validate configuration and credentials\\n- Review script imports and dependencies') + f'''

---
*Automated notification from production email campaign workflow*  
*Using YOUR existing scripts with full integration*  
*Generated: $(date)*
'''

try:
    headers = {
        'Authorization': f'token {github_token}',
        'Accept': 'application/vnd.github.v3+json',
        'User-Agent': 'GitHub-Actions-Campaign-Workflow'
    }
    
    data = {
        'title': title,
        'body': body,
        'labels': ['campaign-report', 'automated', 'production']
